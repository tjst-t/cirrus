syntax = "proto3";
package cirrus.network.v1;
option go_package = "github.com/tjst-t/cirrus/proto/networkpb";

// Note: generate with:
//   protoc -I proto --go_out=proto/networkpb --go_opt=module=github.com/tjst-t/cirrus/proto/networkpb \
//     --go-grpc_out=proto/networkpb --go-grpc_opt=module=github.com/tjst-t/cirrus/proto/networkpb \
//     proto/network.proto

// NetworkStateService is called BY workers to receive network state updates.
// The controller computes per-host state and streams it to each worker.
service NetworkStateService {
  // WatchHostNetworkState opens a server-streaming RPC.
  // The first message is a full state snapshot (full=true).
  // Subsequent messages are deltas (full=false) with additions and removals.
  rpc WatchHostNetworkState(WatchHostNetworkStateRequest)
      returns (stream HostNetworkStateUpdate);
}

message WatchHostNetworkStateRequest {
  string host_id = 1;
  string registration_token = 2;
}

// HostNetworkStateUpdate wraps either a full snapshot or a delta update.
message HostNetworkStateUpdate {
  // full=true: agent should replace all state with this snapshot.
  // full=false: agent should apply additions in state and process removals.
  bool full = 1;

  // The state payload (full snapshot or additions for delta).
  HostNetworkState state = 2;

  // For delta updates: IDs/keys of removed items.
  repeated string removed_port_ids = 3;
  repeated string removed_policy_ids = 4;
  repeated string removed_dns_names = 5;
  repeated string removed_remote_port_ips = 6;

  // Monotonically increasing version for ordering and staleness detection.
  uint64 version = 7;

  // For delta updates: IDs of removed egress/ingress rules.
  repeated string removed_egress_ids = 8;
  repeated string removed_ingress_ids = 9;
}

// HostNetworkState is the complete or partial network state for a single host.
message HostNetworkState {
  repeated PortState ports = 1;
  repeated PolicyRule policies = 2;
  repeated RemotePort remote_ports = 3;
  repeated DnsRecord dns_records = 4;
  repeated EgressRule egress_rules = 5;    // only populated for GW-role hosts
  repeated IngressRule ingress_rules = 6;  // only populated for GW-role hosts
  GatewayInfo gateway_info = 7;            // only populated for GW-role hosts
}

// VPNIPsecConfig holds IKEv2 IPsec tunnel configuration for an EgressRule.
message VPNIPsecConfig {
  string peer_ip = 1;        // Remote IPsec peer address
  string pre_shared_key = 2; // IKEv2 pre-shared key
  string local_cidr = 3;     // Tenant network CIDR
  string remote_cidr = 4;    // On-prem CIDR
}

// VPNWireGuardConfig holds WireGuard tunnel configuration for an EgressRule.
message VPNWireGuardConfig {
  string private_key = 1;        // Decrypted private key (only sent to GW worker)
  string public_key = 2;         // WireGuard public key (base64)
  string peer_public_key = 3;    // Peer's WireGuard public key (base64)
  string peer_endpoint = 4;      // Peer host:port
  repeated string allowed_ips = 5; // CIDRs routed through the tunnel
  int32 listen_port = 6;         // WireGuard listen port
}

// DirectConnectConfig holds VLAN trunk configuration for an EgressRule.
message DirectConnectConfig {
  int32 vlan_id = 1;      // VLAN tag for this tenant segment (1-4094)
  string uplink_port = 2; // Physical uplink port name on the GW host
}

// EgressRule describes an Egress rule for a GW node.
message EgressRule {
  string egress_id = 1;
  string network_id = 2;
  // TODO: Convert to enum EgressType for compile-time safety. Requires coordinated
  // wire format migration. Valid values: "nat_gateway", "vpn_ipsec", "vpn_wireguard", "direct_connect".
  string type = 3;
  string public_ip = 4;                  // The public IP for SNAT (nat_gateway only)
  string network_cidr = 5;               // The tenant network CIDR
  VPNIPsecConfig vpn_ipsec = 6;          // Populated for vpn_ipsec type
  VPNWireGuardConfig vpn_wireguard = 7;  // Populated for vpn_wireguard type
  DirectConnectConfig direct_connect = 8; // Populated for direct_connect type
}

// L4LBBackend describes one backend in an L4 LB ingress group.
message L4LBBackend {
  string vm_id   = 1;
  string ip      = 2;
  int32  port    = 3;
  int32  weight  = 4;
  bool   healthy = 5;
}

// IngressRule describes an Ingress rule for a GW node.
// For type="direct_ip": target_ip is used.
// For type="l4_lb": listener_port, protocol, backends, session_affinity are used.
message IngressRule {
  string ingress_id = 1;
  string network_id = 2;
  string type = 3;                     // "direct_ip" or "l4_lb"
  string public_ip = 4;                // The public IP that external traffic arrives on
  string target_ip = 5;                // direct_ip: The VM private IP to DNAT to
  int32  listener_port = 6;            // l4_lb: port on public_ip to receive traffic
  string protocol = 7;                 // l4_lb: "tcp"
  repeated L4LBBackend backends = 8;  // l4_lb: backend list (healthy only delivered)
  string session_affinity = 9;         // l4_lb: "none" (5-tuple hash) or "source_ip"
}

// GatewayInfo tells a GW-role host its external IP for SNAT/DNAT.
message GatewayInfo {
  string external_ip = 1;
  string internal_ip = 2;
}

// PortState describes a local VM port on this host.
message PortState {
  string port_id = 1;
  string vm_id = 2;
  string vm_name = 3;
  string network_id = 4;
  string network_name = 5;
  string group_id = 6;
  string group_name = 7;
  string mac_address = 8;
  string ip_address = 9;    // VM IP (the .1 in the /30 block)
  string gateway_ip = 10;   // Gateway IP (the .2 in the /30 block)
  int32 vni = 11;           // VXLAN Network Identifier for Geneve
}

// PolicyRule describes an allow/deny rule between two groups.
message PolicyRule {
  string policy_id = 1;
  string network_id = 2;
  string src_group_id = 3;
  string dst_group_id = 4;
  string protocol = 5;      // "tcp", "udp", "icmp", "any"
  int32 dst_port = 6;       // 0 means any port
  int32 priority = 7;
  string action = 8;        // "allow" or "deny"
}

// RemotePort describes a VM port on another host that local VMs may communicate with.
message RemotePort {
  string network_id = 1;
  string group_id = 2;
  string ip_address = 3;
  string host_ip = 4;       // Geneve tunnel endpoint (remote host address)
  int32 vni = 5;
}

// DnsRecord describes a DNS record for a VM within a network.
message DnsRecord {
  string name = 1;           // e.g. "vm-1.api.my-app.internal"
  string ip = 2;
  string network_id = 3;
}
