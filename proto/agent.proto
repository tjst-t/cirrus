syntax = "proto3";
package cirrus.agent.v1;
option go_package = "github.com/tjst-t/cirrus/proto/agentpb";

// Note: generate with:
//   protoc -I proto --go_out=proto/agentpb --go_opt=module=github.com/tjst-t/cirrus/proto/agentpb \
//     --go-grpc_out=proto/agentpb --go-grpc_opt=module=github.com/tjst-t/cirrus/proto/agentpb \
//     proto/agent.proto

// ControllerService is called BY workers to register, send heartbeats, and report health.
service ControllerService {
  rpc RegisterHost(RegisterHostRequest) returns (RegisterHostResponse);
  rpc Heartbeat(HeartbeatRequest) returns (HeartbeatResponse);
  rpc ReportBackendHealth(ReportBackendHealthRequest) returns (ReportBackendHealthResponse);
}

// WorkerService is called BY the controller on workers to manage VMs.
service WorkerService {
  rpc CreateVM(CreateVMRequest) returns (CreateVMResponse);
  rpc DeleteVM(DeleteVMRequest) returns (DeleteVMResponse);
  rpc StartVM(StartVMRequest) returns (StartVMResponse);
  rpc StopVM(StopVMRequest) returns (StopVMResponse);
  rpc ForceStopVM(ForceStopVMRequest) returns (ForceStopVMResponse);
  rpc RebootVM(RebootVMRequest) returns (RebootVMResponse);
  rpc GetVMState(GetVMStateRequest) returns (GetVMStateResponse);
  // ライブマイグレーション
  rpc PrepareMigration(PrepareMigrationRequest) returns (PrepareMigrationResponse);
  rpc StartMigration(StartMigrationRequest) returns (StartMigrationResponse);
  rpc AcceptMigratedVM(AcceptMigratedVMRequest) returns (AcceptMigratedVMResponse);
}

message RegisterHostRequest {
  string registration_token = 1;
  string hostname = 2;
  string address = 3;
  string capability = 4; // JSON-encoded capability
  // Topology self-declaration (optional; validated against existing domains)
  reserved 5; // was network_domain (removed in Sprint 5N)
  repeated string storage_domains = 6; // storage domain names or IDs
  string location = 7;                // location name or ID
  string fabric_ip = 8;              // IP for Geneve tunnel endpoints (overlay fabric)
  string worker_grpc_addr = 9;      // address of this worker's WorkerService gRPC server (e.g. "host:9191")
}

message RegisterHostResponse {
  string host_id = 1; // assigned UUID
  bool accepted = 2;
  string message = 3;
}

message HeartbeatRequest {
  string host_id = 1;
  ResourceReport resources = 2;
  string registration_token = 3;
}

message HeartbeatResponse {
  bool accepted = 1;
}

message ResourceReport {
  int32 used_vcpus = 1;
  int64 used_ram_mb = 2;
  repeated VMInfo running_vms = 3;
}

message VMInfo {
  string vm_id = 1;
  string status = 2;
  int32 vcpus = 3;
  int64 ram_mb = 4;
}

// DiskSpec describes a block device to attach to a VM.
message DiskSpec {
  string device_path = 1;           // host-side block device (e.g. /dev/sdb), filled in by worker after Attach
  string target_dev = 2;            // guest device name (e.g. "vda")
  string protocol = 3;              // storage protocol: "sim", "iscsi", "rbd"
  map<string, string> params = 4;   // protocol-specific parameters from ExportInfo
}

// PortSpec describes a network interface to attach to a VM.
message PortSpec {
  string port_id = 1;     // OVS interfaceid / Logical_Switch_Port name
  string mac_address = 2; // guest MAC address
  string bridge_name = 3; // OVS bridge name
}

// CloudInitSpec contains cloud-init seed data for a VM.
message CloudInitSpec {
  string hostname = 1;
  string user_data = 2;
  string meta_data = 3;
  string network_config = 4;
}

message CreateVMRequest {
  string vm_id = 1;       // UUID assigned by the compute orchestrator
  string name = 2;        // VM name
  int32 vcpus = 3;
  int64 ram_mb = 4;
  repeated DiskSpec disks = 5;
  repeated PortSpec ports = 6;
  CloudInitSpec cloud_init = 7;
}

message CreateVMResponse {
  string vm_id = 1;
  string status = 2; // "running" on success
}

message DeleteVMRequest {
  string vm_id = 1;
  string name = 2;
  repeated DiskSpec disks = 3; // disks to detach
}

message DeleteVMResponse {}

message StartVMRequest {
  string vm_id = 1;
  string name = 2;
}
message StartVMResponse {}

message StopVMRequest {
  string vm_id = 1;
  string name = 2;
}
message StopVMResponse {}

message ForceStopVMRequest {
  string vm_id = 1;
  string name = 2;
}
message ForceStopVMResponse {}

message RebootVMRequest {
  string vm_id = 1;
  string name = 2;
}
message RebootVMResponse {}

message GetVMStateRequest {
  string vm_id = 1;
  string name = 2;
}
message GetVMStateResponse {
  string state = 1; // "running", "shutoff", "paused", etc.
}

message PrepareMigrationRequest {
  string vm_id = 1;       // UUID of the VM to migrate
  string vm_name = 2;     // name used by libvirt (e.g. "vm-<short-id>")
  string src_host_id = 3; // source host ID (for logging)
}

message PrepareMigrationResponse {
  string dest_host_id = 1; // confirmed destination host ID
}

message StartMigrationRequest {
  string vm_id = 1;
  string vm_name = 2;
  string dest_host_id = 3; // destination host ID to migrate to
}

message StartMigrationResponse {}

// AcceptMigratedVM: dest worker が移行 VM を自ホストのシムに登録する（HostInstance モード用）
message AcceptMigratedVMRequest {
  string vm_id = 1;
  string vm_name = 2;
  int32 vcpus = 3;
  int64 ram_mb = 4;
  repeated string interface_ids = 5;
}

message AcceptMigratedVMResponse {}

// BackendHealthStatus reports the health of one backend VM in an l4_lb ingress.
message BackendHealthStatus {
  string ingress_id = 1;
  string vm_id      = 2;
  bool   healthy    = 3;
  string message    = 4; // optional diagnostic message
}

message ReportBackendHealthRequest {
  string host_id            = 1;
  string registration_token = 2;
  repeated BackendHealthStatus statuses = 3;
}

message ReportBackendHealthResponse {
  bool accepted = 1;
}
