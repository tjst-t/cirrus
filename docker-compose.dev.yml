# Cirrus Development Environment — Worker Containers
#
# All ports are assigned by portman via .env (generated by make serve).
# Never hardcode port numbers.

version: "2.4"

services:
  worker-1:
    build:
      context: .
      dockerfile: test/integration/Dockerfile.worker
    privileged: true
    hostname: worker-1
    environment:
      - HOST_ID=host-worker-1
      - LIBVIRT_PORT=16509
      - LIBVIRTD_SIM_MGMT_PORT=8100
      - CONTROLLER_ADDR=${CONTROLLER_HOST}:${GRPC_PORT}
      - REGISTRATION_TOKEN=${REGISTRATION_TOKEN}
    networks:
      fabric:
        ipv4_address: 10.100.0.11
    ports:
      - "${WORKER_1_PORT}:8100"

  worker-2:
    build:
      context: .
      dockerfile: test/integration/Dockerfile.worker
    privileged: true
    hostname: worker-2
    environment:
      - HOST_ID=host-worker-2
      - LIBVIRT_PORT=16509
      - LIBVIRTD_SIM_MGMT_PORT=8100
      - CONTROLLER_ADDR=${CONTROLLER_HOST}:${GRPC_PORT}
      - REGISTRATION_TOKEN=${REGISTRATION_TOKEN}
    networks:
      fabric:
        ipv4_address: 10.100.0.12
    ports:
      - "${WORKER_2_PORT}:8100"

  worker-3:
    build:
      context: .
      dockerfile: test/integration/Dockerfile.worker
    privileged: true
    hostname: worker-3
    environment:
      - HOST_ID=host-worker-3
      - LIBVIRT_PORT=16509
      - LIBVIRTD_SIM_MGMT_PORT=8100
      - CONTROLLER_ADDR=${CONTROLLER_HOST}:${GRPC_PORT}
      - REGISTRATION_TOKEN=${REGISTRATION_TOKEN}
    networks:
      fabric:
        ipv4_address: 10.100.0.13
    ports:
      - "${WORKER_3_PORT}:8100"

networks:
  fabric:
    driver: bridge
    ipam:
      config:
        - subnet: 10.100.0.0/24
